services:
  - type: web
    name: flowify-api
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8787
      - key: YTDLP_PATH
        value: yt-dlp
      - key: FFMPEG_PATH
        value: ffmpeg
      - key: YTDLP_JS_RUNTIME
        value: deno
      - key: YTDLP_REMOTE_COMPONENTS
        value: ejs:github
      - key: STATIC_DIR
        value: /app/apps/web/dist
      - key: CORS_ORIGIN
        value: "true"
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ENDPOINT
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET
        value: flowify-music
      - key: R2_PUBLIC_BASE_URL
        sync: false
      - key: CLOUD_UPLOAD_LIMIT
        value: 80mb

  - type: web
    name: flowify-pocketbase
    runtime: docker
    plan: free
    dockerfilePath: ./pocketbase.Dockerfile
    dockerContext: .
    healthCheckPath: /
    autoDeployTrigger: commit
    envVars:
      - key: POCKETBASE_ADMIN_EMAIL
        sync: false
      - key: POCKETBASE_ADMIN_PASSWORD
        sync: false
